name: Auto Post Social Media

on:
  schedule:
    # 6h, 10h, 14h, 18h, 22h UTC (8h, 12h, 16h, 20h, 00h Paris)
    - cron: '0 6,10,14,18,22 * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post to social media
        env:
          META_LONG_LIVED_TOKEN: ${{ secrets.META_LONG_LIVED_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_ID: ${{ secrets.LINKEDIN_MEMBER_ID }}
        run: |
          node << 'SCRIPT'
          const USER_TOKEN = process.env.META_LONG_LIVED_TOKEN;
          const IMAGE_URL = "https://dreamteamafricamedia.b-cdn.net/campaigns/foire-afrique-danseuse-j24.png";
          const EVENT_URL = "https://dreamteamafrica.com/saison-culturelle-africaine/foire-dafrique-paris";

          const IG_EXPOSANT_GROUPS = [
            "@sanaacreation_ @famashop78 @jabcollectionwax @by_kemi @cbk_planner @olgstyle @makakreation @beghabyrina @evra_hodna @mossane_pagne_tisse @dieynissa_fashion @anna_kate_pro @admundo_concept",
            "@maisonnimba @edeniquecoffee @lesfondantsdeGrace @mila_2585 @el.glorious.7 @asili_le_soin @samhatchad @queenyemuna @okosmetik18 @darna_senteurs @retour_aux_sources_by_ad @bijoo_bijoo",
            "@conficulture_afro_quiz @rentavoyage @le_comptoir_d_acraa @orange_zulucrown @izikaofficiel @nanse3d @yohel.france @kelima_ @abidjanis.art @cnergysolar @maison.dalla @lessecretsdobama @artaidani",
          ];

          function getExposantMentions() {
            const idx = Math.floor(Date.now() / 86400000) % IG_EXPOSANT_GROUPS.length;
            return IG_EXPOSANT_GROUPS[idx];
          }

          const IG_MENTIONS = `\n\n.\n.\n.\nNos exposants :\n${getExposantMentions()}`;

          const FB_MESSAGES = [
            `рЯМН FOIRE D'AFRIQUE PARIS 2026 вАФ 6√®me √Йdition\n\nрЯФ• Pr√©vente en ligne √† 10вВђ вАФ Avant passage √† 15вВђ sur place !\n\nMode вАҐ Artisanat вАҐ Gastronomie вАҐ Bijoux\n+60 exposants\n\nрЯЧУ 1er & 2 Mai 2026 ¬Ј 12h-22h\nрЯУН Espace MAS вАФ Paris 13e\n\nрЯОЯ ${EVENT_URL}`,
            `вЬ® Le Grand March√© Africain revient √† Paris !\n\n+60 exposants vous attendent pour c√©l√©brer la culture africaine.\n\nTextiles wax, bogolan, bijoux, gastronomie...\n\nрЯОЯ Billets √† 10вВђ en pr√©vente (15вВђ sur place)\n\nрЯЧУ 1er & 2 Mai 2026\nрЯУН Espace MAS вАФ Paris 13e\n\nрЯСЙ ${EVENT_URL}`,
            `рЯОЙ Plus que quelques jours avant la Foire d'Afrique Paris 2026 !\n\nD√©j√† 348 billets vendus. Profitez du tarif pr√©vente √† 10вВђ avant le passage √† 15вВђ.\n\nрЯЧУ 1er & 2 Mai 2026 ¬Ј 12h-22h\nрЯУН Espace MAS вАФ 10 rue des Terres au Cur√©, 75013 Paris\n\nрЯОЯ ${EVENT_URL}`,
            `рЯМН La diaspora africaine se retrouve √† Paris !\n\nFoire d'Afrique 2026 вАФ 6√®me √©dition\nMode, artisanat, gastronomie, bijoux, musique live\n\n+60 exposants вАҐ DJ sets вАҐ Masterclass\n\nрЯОЯ Pr√©vente 10вВђ (tarif plein 15вВђ)\nрЯЧУ 1er & 2 Mai 2026 ¬Ј Espace MAS Paris\n\nрЯСЙ ${EVENT_URL}`,
            `рЯТО Bijoux, textiles, saveurs d'Afrique...\n\nTout √Іa √† la Foire d'Afrique Paris вАФ 6√®me √Йdition !\n\nрЯЧУ 1er & 2 Mai 2026\nрЯХР 12h вАФ 22h\nрЯУН Espace MAS вАФ Paris 13e\n\nрЯОЯ Billets √† 10вВђ en pr√©vente\nрЯСЙ ${EVENT_URL}`,
            `рЯФ• L'√©v√©nement incontournable de la diaspora africaine √† Paris !\n\nFoire d'Afrique 2026 : le Grand March√© Africain\n\n+60 exposants ¬Ј Mode ¬Ј Artisanat ¬Ј Gastronomie ¬Ј Bijoux\n\nрЯОЯ 10вВђ en pr√©vente вАФ 15вВђ sur place\nрЯЧУ 1er & 2 Mai 2026\nрЯУН Espace MAS, Paris 13e\n\nрЯСЙ ${EVENT_URL}`,
          ];

          const IG_CAPTIONS = [
            `рЯМН FOIRE D'AFRIQUE PARIS 2026 вАФ 6√®me √Йdition\n\nрЯФ• Pr√©vente en ligne √† 10вВђ вАФ Avant passage √† 15вВђ sur place !\n\n+60 exposants ¬Ј Mode ¬Ј Artisanat ¬Ј Gastronomie ¬Ј Bijoux\n\nрЯЧУ 1er & 2 Mai 2026 ¬Ј 12h-22h\nрЯУН Espace MAS Paris 13e\n\nрЯФЧ Lien en bio\n\n#FoiredAfrique #Paris2026 #CultureAfricaine #Afrique #DiasporaAfricaine #Wax #Artisanat #MadeInAfrica${IG_MENTIONS}`,
            `вЬ® Le Grand March√© Africain revient !\n\n+60 exposants вАҐ Mode вАҐ Artisanat вАҐ Gastronomie вАҐ Bijoux\n\nрЯОЯ Pr√©vente 10вВђ (15вВђ sur place)\nрЯЧУ 1er & 2 Mai 2026\nрЯУН Espace MAS Paris\n\nрЯФЧ Lien en bio\n\n#FoiredAfrique #Paris2026 #MadeInAfrica #Bogolan #BijouxAfricains #GastronomieAfricaine${IG_MENTIONS}`,
            `рЯОЙ Compte √† rebours lanc√© !\n\nFoire d'Afrique Paris вАФ 6√®me √Йdition\nD√©j√† 348 billets vendus рЯФ•\n\nрЯОЯ 10вВђ en pr√©vente\nрЯУН Espace MAS вАФ Paris 13e\nрЯЧУ 1er & 2 Mai 2026\n\nрЯФЧ Lien en bio\n\n#FoiredAfrique #Paris2026 #SaisonCulturelleAfricaine #Afrique #Culture #EspaceMAS${IG_MENTIONS}`,
            `рЯТО Bijoux, textiles wax, gastronomie africaine...\n\nTout √Іa √† la Foire d'Afrique Paris 2026 !\n\nрЯОЯ 10вВђ en pr√©vente (15вВђ sur place)\nрЯЧУ 1er & 2 Mai ¬Ј 12h-22h\nрЯУН Paris 13e\n\nрЯФЧ Lien en bio\n\n#FoiredAfrique #Paris2026 #Wax #BijouxAfricains #Artisanat #DiasporaAfricaine${IG_MENTIONS}`,
            `рЯМН La diaspora se retrouve √† Paris !\n\nFoire d'Afrique 2026 вАФ +60 exposants\nMusique live вАҐ DJ sets вАҐ Masterclass\n\nрЯОЯ Billets 10вВђ en pr√©vente\nрЯЧУ 1er & 2 Mai 2026\n\nрЯФЧ Lien en bio\n\n#FoiredAfrique #Paris2026 #CultureAfricaine #GrandMarcheAfricain #Afrique #MadeInAfrica${IG_MENTIONS}`,
            `рЯФ• L'√©v√©nement incontournable !\n\nFoire d'Afrique Paris вАФ 6√®me √Йdition\nMode вАҐ Artisanat вАҐ Gastronomie вАҐ Bijoux\n\nрЯОЯ Pr√©vente 10вВђ вАФ Tarif plein 15вВђ\nрЯУН Espace MAS Paris 13e\nрЯЧУ 1er & 2 Mai 2026\n\nрЯФЧ Lien en bio\n\n#FoiredAfrique #Paris2026 #SaisonCulturelleAfricaine #Afrique${IG_MENTIONS}`,
          ];

          const LINKEDIN_MESSAGES = [
            `Foire d'Afrique Paris 2026 вАФ 6√®me √Йdition\n\nLe Grand March√© Africain r√©unit plus de 60 entrepreneurs et artisans de la diaspora africaine.\n\nMode, artisanat, gastronomie, bijouterie, masterclass.\n\nDates : 1er et 2 Mai 2026\nLieu : Espace MAS, Paris 13e\nBillets : 10вВђ en pr√©vente (15вВђ sur place)\n\n${EVENT_URL}`,
            `L'entrepreneuriat africain √† l'honneur √† Paris\n\nLa 6√®me √©dition de la Foire d'Afrique rassemble +60 exposants de la diaspora africaine.\n\nUn √©v√©nement qui valorise le savoir-faire et les talents africains en France.\n\n1er et 2 Mai 2026 вАФ Espace MAS, Paris\nPr√©vente : 10вВђ\n\n${EVENT_URL}`,
          ];

          const ALL_PAGES = [
            { fbPageId: "100771645843324", name: "Foire d'Afrique Paris", igAccountId: "17841451573905367" },
            { fbPageId: "758857223971003", name: "Saison Culturelle Africaine", igAccountId: "17841476132573046" },
            { fbPageId: "103237448423568", name: "L'Afrop√©en", igAccountId: "17841463617635776" },
            { fbPageId: "2102035170082738", name: "Dream Team Media", igAccountId: "17841463915374380" },
            { fbPageId: "115115284984783", name: "Fashion Week Africa", igAccountId: "17841460868610001" },
            { fbPageId: "1400649140241791", name: "Salon Made In Africa", igAccountId: "17841443647743654" },
            { fbPageId: "681998191664292", name: "Festival Du Conte", igAccountId: "17841475396377414" },
            { fbPageId: "759497097244387", name: "Les Pr√©cieux d'Afrique", igAccountId: "17841476404526271" },
            { fbPageId: "761767393680796", name: "LeBonMaterielPro", igAccountId: "17841476351397215" },
            { fbPageId: "101332929473139", name: "Service At Home", igAccountId: "17841475626714555" },
            { fbPageId: "717159181488560", name: "√Йvasion Paris" },
            { fbPageId: "109396695434333", name: "√Йglise M√©thodiste" },
            { fbPageId: "578051505668347", name: "L'Officiel d'Afrique" },
            { fbPageId: "817148755109623", name: "Ferme Artisanale" },
            { fbPageId: "106862708522725", name: "La Plante" },
            { fbPageId: "476817895519225", name: "AUTO 4" },
          ];

          function getRotationIndex(total) {
            const hour = new Date().getHours();
            const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0).getTime()) / 86400000);
            return (dayOfYear * 6 + Math.floor(hour / 4)) % total;
          }

          async function getPageTokens() {
            const res = await fetch(`https://graph.facebook.com/v23.0/me/accounts?limit=50&access_token=${USER_TOKEN}`);
            const data = await res.json();
            const tokens = new Map();
            for (const page of data.data || []) tokens.set(page.id, page.access_token);
            return tokens;
          }

          (async () => {
            const idx = getRotationIndex(FB_MESSAGES.length);
            const fbMessage = FB_MESSAGES[idx];
            const igCaption = IG_CAPTIONS[idx];
            const liMessage = LINKEDIN_MESSAGES[idx % LINKEDIN_MESSAGES.length];

            const tokens = await getPageTokens();
            let fbOk = 0, igOk = 0;

            for (const page of ALL_PAGES) {
              const token = tokens.get(page.fbPageId);
              if (!token) continue;

              // Facebook
              try {
                const params = new URLSearchParams();
                if (page.fbPageId === "100771645843324") {
                  params.append("message", fbMessage);
                } else {
                  params.append("message", `рЯМН La Foire d'Afrique Paris revient les 1er & 2 Mai !\n\nBillets 10вВђ en pr√©vente (15вВђ sur place)\n+60 exposants ¬Ј Mode ¬Ј Artisanat ¬Ј Gastronomie\n\nрЯСЙ ${EVENT_URL}`);
                }
                params.append("link", EVENT_URL);

                const fbRes = await fetch(`https://graph.facebook.com/v23.0/${page.fbPageId}/feed`, {
                  method: "POST",
                  headers: { Authorization: `Bearer ${token}` },
                  body: params,
                });
                const fb = await fbRes.json();
                if (fb.id) { fbOk++; console.log(`FB ${page.name}: OK`); }
                else console.log(`FB ${page.name}: ${JSON.stringify(fb).slice(0, 80)}`);
              } catch { console.log(`FB ${page.name}: error`); }

              // Instagram
              if (page.igAccountId) {
                try {
                  const containerParams = new URLSearchParams({ image_url: IMAGE_URL, caption: igCaption });
                  const containerRes = await fetch(`https://graph.facebook.com/v23.0/${page.igAccountId}/media?${containerParams}`, {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token}` },
                  });
                  const container = await containerRes.json();

                  if (container.id) {
                    await new Promise(r => setTimeout(r, 2000));
                    const pubRes = await fetch(`https://graph.facebook.com/v23.0/${page.igAccountId}/media_publish?creation_id=${container.id}`, {
                      method: "POST",
                      headers: { Authorization: `Bearer ${token}` },
                    });
                    const pub = await pubRes.json();
                    if (pub.id) { igOk++; console.log(`IG ${page.name}: OK`); }
                    else console.log(`IG ${page.name}: ${JSON.stringify(pub).slice(0, 80)}`);
                  }
                } catch { console.log(`IG ${page.name}: error`); }
              }
            }

            // LinkedIn
            let liOk = false;
            try {
              const liAccessToken = process.env.LINKEDIN_ACCESS_TOKEN;
              const liMemberId = process.env.LINKEDIN_MEMBER_ID;
              if (liAccessToken && liMemberId) {
                const liRes = await fetch("https://api.linkedin.com/v2/ugcPosts", {
                  method: "POST",
                  headers: { Authorization: `Bearer ${liAccessToken}`, "Content-Type": "application/json" },
                  body: JSON.stringify({
                    author: `urn:li:person:${liMemberId}`,
                    lifecycleState: "PUBLISHED",
                    specificContent: {
                      "com.linkedin.ugc.ShareContent": {
                        shareCommentary: { text: liMessage },
                        shareMediaCategory: "ARTICLE",
                        media: [{ status: "READY", originalUrl: EVENT_URL, title: { text: "Foire d'Afrique Paris 2026 вАФ Billets √† 10вВђ" } }],
                      },
                    },
                    visibility: { "com.linkedin.ugc.MemberNetworkVisibility": "PUBLIC" },
                  }),
                });
                const li = await liRes.json();
                liOk = !!li.id;
                console.log(`LinkedIn: ${li.id ? "OK" : JSON.stringify(li).slice(0, 80)}`);
              }
            } catch { console.log("LinkedIn: error"); }

            console.log(`\nRotation #${idx + 1} вАФ FB: ${fbOk}, IG: ${igOk}, LI: ${liOk ? 1 : 0}`);
          })();
          SCRIPT
