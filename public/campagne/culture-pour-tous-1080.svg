<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="price" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A6896A"/>
      <stop offset="100%" stop-color="#8B6F4E"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8B6F4E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B6F4E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Halo décoratif -->
  <circle cx="860" cy="220" r="340" fill="url(#glow)"/>
  <circle cx="220" cy="900" r="320" fill="url(#glow)" opacity="0.7"/>

  <!-- Motif africain (cercles concentriques subtils) -->
  <g opacity="0.08" stroke="#E8DFD3" fill="none" stroke-width="2">
    <circle cx="950" cy="130" r="60"/>
    <circle cx="950" cy="130" r="90"/>
    <circle cx="950" cy="130" r="120"/>
    <circle cx="130" cy="950" r="60"/>
    <circle cx="130" cy="950" r="90"/>
  </g>

  <!-- Badge NOUVEAU -->
  <g transform="translate(80,100)">
    <rect width="180" height="44" rx="22" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.5"/>
    <text x="90" y="29" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="3" fill="#86efac" text-anchor="middle">NOUVEAU</text>
  </g>

  <!-- Logo / Marque -->
  <text x="1000" y="128" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#E8DFD3" text-anchor="end" opacity="0.85">DREAM TEAM AFRICA</text>

  <!-- Titre -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="96" font-weight="800" fill="#FFFFFF">Culture</text>
  <text x="80" y="390" font-family="Georgia, serif" font-size="96" font-weight="800" fill="#FFFFFF">pour Tous</text>

  <!-- Sous-titre -->
  <text x="80" y="450" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#E8DFD3" opacity="0.8">La culture africaine accessible à tous, à Paris.</text>

  <!-- Bloc prix -->
  <g transform="translate(80,510)">
    <rect width="920" height="240" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="#8B6F4E" stroke-opacity="0.4"/>
    <text x="40" y="80" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#E8DFD3" opacity="0.7">Réservez dès</text>
    <text x="40" y="200" font-family="Georgia, serif" font-size="200" font-weight="900" fill="url(#price)">5€</text>
    <text x="440" y="110" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Payez comme</text>
    <text x="440" y="155" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">vous pouvez.</text>
    <text x="440" y="195" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#A6896A">Billet immédiat · QR code · Prix garanti</text>
  </g>

  <!-- Barre de progression décorative -->
  <g transform="translate(80,790)">
    <rect width="920" height="14" rx="7" fill="#ffffff" fill-opacity="0.1"/>
    <rect width="580" height="14" rx="7" fill="url(#progress)"/>
  </g>

  <!-- 3 étapes -->
  <g transform="translate(80,850)" font-family="Helvetica, Arial, sans-serif">
    <g>
      <circle cx="20" cy="20" r="20" fill="#8B6F4E"/>
      <text x="20" y="27" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
      <text x="55" y="17" font-size="18" font-weight="700" fill="#FFFFFF">Acompte</text>
      <text x="55" y="40" font-size="16" fill="#A6896A">5€ et c'est réservé</text>
    </g>
    <g transform="translate(320,0)">
      <circle cx="20" cy="20" r="20" fill="#8B6F4E"/>
      <text x="20" y="27" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
      <text x="55" y="17" font-size="18" font-weight="700" fill="#FFFFFF">Recharges</text>
      <text x="55" y="40" font-size="16" fill="#A6896A">Dès 1€, quand vous voulez</text>
    </g>
    <g transform="translate(640,0)">
      <circle cx="20" cy="20" r="20" fill="#22c55e"/>
      <text x="20" y="27" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">✓</text>
      <text x="55" y="17" font-size="18" font-weight="700" fill="#FFFFFF">On y est !</text>
      <text x="55" y="40" font-size="16" fill="#A6896A">QR code à l'entrée</text>
    </g>
  </g>

  <!-- CTA URL -->
  <g transform="translate(80,970)">
    <rect width="920" height="70" rx="35" fill="#8B6F4E"/>
    <text x="460" y="46" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">dreamteamafrica.com/culture-pour-tous</text>
  </g>
</svg>
