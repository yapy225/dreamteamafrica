<!--
  ============================================================
  BLOC NEWSLETTER — GetYourGuide Affiliation
  À insérer dans les newsletters L'Afropéen avant chaque événement DTA.

  Remplacer les variables :
  - {{EVENT_NAME}}       → ex: "la Foire d'Afrique Paris"
  - {{ACTIVITY_TITLE}}   → ex: "une croisière sur la Seine"
  - {{ACTIVITY_IMAGE}}   → URL de l'image de l'activité
  - {{AFFILIATE_LINK}}   → Lien affilié GYG complet
  - {{ACTIVITY_PRICE}}   → ex: "À partir de 16 €"
  ============================================================
-->

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 24px 0;">
  <tr>
    <td style="padding: 0;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #FBF8F4; border: 1px solid #E8DFD3; border-radius: 14px; overflow: hidden;">
        <!-- Image -->
        <tr>
          <td style="padding: 0;">
            <a href="{{AFFILIATE_LINK}}" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
              <img src="{{ACTIVITY_IMAGE}}" alt="{{ACTIVITY_TITLE}}" width="600" style="display: block; width: 100%; height: auto; border-radius: 14px 14px 0 0;" />
            </a>
          </td>
        </tr>
        <!-- Contenu -->
        <tr>
          <td style="padding: 24px 24px 20px;">
            <!-- Badge -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="background-color: #8B6F4E; color: #ffffff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 12px; border-radius: 20px; font-family: 'Outfit', Arial, sans-serif;">
                  Recommandation
                </td>
              </tr>
            </table>

            <h3 style="font-family: 'Cormorant Garamond', Georgia, serif; font-size: 22px; font-weight: 700; color: #1A1A1A; margin: 12px 0 8px;">
              Profitez de votre venue à Paris
            </h3>

            <p style="font-family: 'Outfit', Arial, sans-serif; font-size: 14px; line-height: 1.6; color: #2E2E2E; margin: 0 0 16px; opacity: 0.8;">
              Vous venez pour {{EVENT_NAME}} ? Ne repartez pas sans avoir découvert {{ACTIVITY_TITLE}}.
            </p>

            <!-- Prix -->
            <p style="font-family: 'Outfit', Arial, sans-serif; font-size: 14px; font-weight: 600; color: #6F5A3E; margin: 0 0 16px;">
              {{ACTIVITY_PRICE}}
            </p>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td align="center" style="padding: 0;">
                  <a href="{{AFFILIATE_LINK}}" target="_blank" rel="noopener noreferrer" style="display: inline-block; background-color: #8B6F4E; color: #ffffff; font-family: 'Outfit', Arial, sans-serif; font-size: 14px; font-weight: 600; text-decoration: none; padding: 12px 32px; border-radius: 10px; text-align: center;">
                    Réserver cette expérience &rarr;
                  </a>
                </td>
              </tr>
            </table>

            <!-- Disclosure -->
            <p style="font-family: 'Outfit', Arial, sans-serif; font-size: 10px; color: #C4B5A4; margin: 16px 0 0; text-align: center; line-height: 1.4;">
              Lien partenaire GetYourGuide — commission perçue sans frais supplémentaires pour vous.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
